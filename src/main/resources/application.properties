spring.application.name=playstate

# Prefer Jackson 2 for MVC message conversion when both Jackson 2 and 3 are on the classpath (see spring-boot-jackson2).
spring.http.converters.preferred-json-mapper=jackson2

# Unknown URLs throw NoHandlerFoundException so we can redirect to / (see NotFoundRedirectAdvice).
spring.mvc.throw-exception-if-no-handler-found=true

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

server.port=${PORT:8080}

spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

igdb.client.id=${IGDB_CLIENT_ID:cw1l4muwi0kqkwiruukydtrxjzhyr8}
igdb.client.secret=${IGDB_CLIENT_SECRET:2pme28x03ihkitnbcvzt080kpwm1ii}

security.user.name=conor
security.user.password=password
security.user.email=

# Shared demo account (created on startup when IGDB credentials work). Log in as demo / playstate-demo
# Set demo.enabled=false in production, or change demo.password.
demo.enabled=true
demo.username=demo
demo.password=playstate-demo
demo.email=demo@example.com
