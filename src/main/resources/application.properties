spring.application.name=playstate

# Prefer Jackson 2 for MVC message conversion when both Jackson 2 and 3 are on the classpath (see spring-boot-jackson2).
spring.http.converters.preferred-json-mapper=jackson2

# Unknown URLs throw NoHandlerFoundException so we can redirect to / (see NotFoundRedirectAdvice).
spring.mvc.throw-exception-if-no-handler-found=true

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false

server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json
server.compression.min-response-size=2KB

spring.thymeleaf.cache=true
spring.web.resources.cache.period=365d
spring.web.resources.chain.cache=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

igdb.client.id=${IGDB_CLIENT_ID:${TWITCH_CLIENT_ID:${TWITCH_CLIENTID:}}}
igdb.client.secret=${IGDB_CLIENT_SECRET:${TWITCH_CLIENT_SECRET:${TWITCH_CLIENTSECRET:}}}

security.user.name=${SECURITY_USER_NAME:}
security.user.password=${SECURITY_USER_PASSWORD:}
security.user.email=${SECURITY_USER_EMAIL:}

# Shared demo account (created on startup when IGDB credentials work).
# Configure with env vars in production.
demo.enabled=${DEMO_ENABLED:false}
demo.username=${DEMO_USERNAME:demo}
demo.password=${DEMO_PASSWORD:}
demo.email=${DEMO_EMAIL:demo@example.com}
