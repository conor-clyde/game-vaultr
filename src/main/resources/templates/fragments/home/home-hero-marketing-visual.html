<div th:fragment="marketingFigure" class="home-hero-figure">
  <div class="home-hero-figure-ring"></div>
  <div class="home-hero-figure-bloom"></div>
  <div class="home-hero-figure-stack">
    <div class="home-hero-figure-card home-hero-figure-card--back"></div>
    <div class="home-hero-figure-card home-hero-figure-card--mid"></div>
    <div class="home-hero-figure-card home-hero-figure-card--front">
      <div class="home-hero-figure-inner">
        <div class="home-hero-figure-actions">
          <div class="home-hero-figure-facade" aria-hidden="true">
            <p class="home-hero-mini-collection-title">
              My <span class="home-hero-mini-collection-mark">Collection</span>
            </p>
          </div>
          <div class="home-hero-figure-orbs">
            <span class="home-hero-figure-orb"
              ><i class="fa-solid fa-magnifying-glass"></i
            ></span>
            <span
              class="home-hero-figure-orb home-hero-figure-orb--selected"
              title="Collection"
              ><i class="fa-solid fa-book" aria-hidden="true"></i
            ></span>
          </div>
        </div>
        <div class="home-hero-figure-tray">
          <div class="home-hero-preview">
            <div class="home-hero-preview-shelf">
              <div class="home-hero-preview-head">
                <span class="home-hero-preview-status">Playing</span>
                <span class="home-hero-preview-count">3</span>
                <span class="home-hero-preview-rule"></span>
              </div>
              <div
                class="home-hero-preview-grid home-hero-preview-grid--playing"
              >
                <div class="home-hero-preview-tile">
                  <div
                    class="home-hero-preview-platform home-hero-preview-platform--pc"
                  >
                    PC
                  </div>
                  <div
                    class="home-hero-preview-cover home-hero-preview-cover--a"
                  ></div>
                </div>
                <div class="home-hero-preview-tile">
                  <div
                    class="home-hero-preview-platform home-hero-preview-platform--ps"
                  >
                    PS5
                  </div>
                  <div
                    class="home-hero-preview-cover home-hero-preview-cover--b"
                  ></div>
                </div>
                <div class="home-hero-preview-tile">
                  <div
                    class="home-hero-preview-platform home-hero-preview-platform--nin"
                  >
                    Switch
                  </div>
                  <div
                    class="home-hero-preview-cover home-hero-preview-cover--c"
                  ></div>
                </div>
              </div>
            </div>
            <div class="home-hero-preview-layered">
              <div class="home-hero-preview-playnext-under" aria-hidden="true">
                <div class="home-hero-preview-playnext-clip">
                  <div class="home-hero-preview-playnext-row">
                    <div class="home-hero-preview-playnext-tile-wrap">
                      <div
                        class="home-hero-preview-tile home-hero-preview-tile--dense home-hero-preview-tile--peek home-hero-preview-tile--cover-only"
                      >
                        <div
                          class="home-hero-preview-cover home-hero-preview-cover--b"
                        ></div>
                      </div>
                    </div>
                    <div class="home-hero-preview-playnext-tile-wrap">
                      <div
                        class="home-hero-preview-tile home-hero-preview-tile--dense home-hero-preview-tile--peek home-hero-preview-tile--cover-only"
                      >
                        <div
                          class="home-hero-preview-cover home-hero-preview-cover--c"
                        ></div>
                      </div>
                    </div>
                    <div class="home-hero-preview-playnext-tile-wrap">
                      <div
                        class="home-hero-preview-tile home-hero-preview-tile--dense home-hero-preview-tile--peek home-hero-preview-tile--cover-only"
                      >
                        <div
                          class="home-hero-preview-cover home-hero-preview-cover--d"
                        ></div>
                      </div>
                    </div>
                    <div class="home-hero-preview-playnext-tile-wrap">
                      <div
                        class="home-hero-preview-tile home-hero-preview-tile--dense home-hero-preview-tile--peek home-hero-preview-tile--cover-only"
                      >
                        <div
                          class="home-hero-preview-cover home-hero-preview-cover--e"
                        ></div>
                      </div>
                    </div>
                    <div class="home-hero-preview-playnext-tile-wrap">
                      <div
                        class="home-hero-preview-tile home-hero-preview-tile--dense home-hero-preview-tile--peek home-hero-preview-tile--cover-only"
                      >
                        <div
                          class="home-hero-preview-cover home-hero-preview-cover--f"
                        ></div>
                      </div>
                    </div>
                    <div class="home-hero-preview-playnext-tile-wrap">
                      <div
                        class="home-hero-preview-tile home-hero-preview-tile--dense home-hero-preview-tile--peek home-hero-preview-tile--cover-only"
                      >
                        <div
                          class="home-hero-preview-cover home-hero-preview-cover--g"
                        ></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div
                class="home-hero-preview-shelf home-hero-preview-shelf--dense home-hero-preview-completed-above"
              >
                <div
                  class="home-hero-preview-head home-hero-preview-head--dense"
                >
                  <span class="home-hero-preview-status">Completed</span>
                  <span class="home-hero-preview-count">5</span>
                  <span class="home-hero-preview-rule"></span>
                </div>
                <div
                  class="home-hero-preview-grid home-hero-preview-grid--completed"
                >
                  <div
                    class="home-hero-preview-tile home-hero-preview-tile--dense"
                  >
                    <div
                      class="home-hero-preview-platform home-hero-preview-platform--xb"
                    >
                      Xbox
                    </div>
                    <div
                      class="home-hero-preview-cover home-hero-preview-cover--d"
                    ></div>
                  </div>
                  <div
                    class="home-hero-preview-tile home-hero-preview-tile--dense"
                  >
                    <div
                      class="home-hero-preview-platform home-hero-preview-platform--pc"
                    >
                      PC
                    </div>
                    <div
                      class="home-hero-preview-cover home-hero-preview-cover--e"
                    ></div>
                  </div>
                  <div
                    class="home-hero-preview-tile home-hero-preview-tile--dense"
                  >
                    <div
                      class="home-hero-preview-platform home-hero-preview-platform--ps"
                    >
                      PS5
                    </div>
                    <div
                      class="home-hero-preview-cover home-hero-preview-cover--f"
                    ></div>
                  </div>
                  <div
                    class="home-hero-preview-tile home-hero-preview-tile--dense"
                  >
                    <div
                      class="home-hero-preview-platform home-hero-preview-platform--nin"
                    >
                      Switch
                    </div>
                    <div
                      class="home-hero-preview-cover home-hero-preview-cover--g"
                    ></div>
                  </div>
                  <div
                    class="home-hero-preview-tile home-hero-preview-tile--dense"
                  >
                    <div
                      class="home-hero-preview-platform home-hero-preview-platform--pc"
                    >
                      PC
                    </div>
                    <div
                      class="home-hero-preview-cover home-hero-preview-cover--a"
                    ></div>
                  </div>
                </div>
              </div>
              <div class="home-hero-preview-playnext-tagline-band">
                <p class="home-hero-preview-playnext-tagline">
                  <span class="home-hero-preview-playnext-tagline-core"
                    >Play next</span
                  >
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:fragment="marketingVisual" class="home-hero-visual" aria-hidden="true">
  <div
    th:replace="~{fragments/home/home-hero-marketing-visual :: marketingFigure}"
  ></div>
</div>
