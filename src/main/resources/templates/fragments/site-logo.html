<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    
    <th:block th:fragment="inner">
        <span class="navbar-logo-badge" aria-hidden="true">GV</span>
        <span class="navbar-logo-text">
            <span class="navbar-logo-game">Game</span><span class="navbar-logo-vault">Vault</span>
        </span>
    </th:block>

    <a th:fragment="navbar" th:href="@{/}" class="navbar-logo" href="/">
        <th:block th:replace="~{fragments/site-logo :: inner}" />
    </a>

    <div th:fragment="authCard" class="auth-card-brand">
        <div class="navbar-logo auth-card-logo">
            <th:block th:replace="~{fragments/site-logo :: inner}" />
        </div>
    </div>

    <div th:fragment="hero" class="home-hero-brand navbar-logo" aria-hidden="true">
        <th:block th:replace="~{fragments/site-logo :: inner}" />
    </div>

    <div th:fragment="footerMark" class="site-footer-brand-mark">
        <span class="navbar-logo site-footer-logo" aria-hidden="true">
            <th:block th:replace="~{fragments/site-logo :: inner}" />
        </span>
    </div>

</body>
</html>
