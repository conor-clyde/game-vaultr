<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <aside
      th:fragment="widget"
      th:if="${navActivePlaySession}"
      class="nav-active-play-session"
      id="navActivePlaySessionFloat"
      role="region"
      th:attr="aria-label=|Playing: ${navActivePlaySessionGameTitle}|,
                 data-start-ms=${navActivePlaySessionStartedAtEpochMs},
                 data-game-api-id=${navActivePlaySessionGameApiId},
                 data-log-id=${navActivePlaySessionLogId},
                 data-session-game-title=${navActivePlaySessionGameTitle}"
    >
      <div class="nav-active-play-session__card">
        <a
          class="nav-active-play-session__cover-link"
          th:href="@{/collection/{id}(id=${navActivePlaySessionGameApiId})}"
          th:title="|Open ${navActivePlaySessionGameTitle}|"
        >
          <span
            class="nav-active-play-session__cover-wrap"
            th:if="${navActivePlaySessionCoverUrl != null}"
          >
            <img
              th:src="${navActivePlaySessionCoverUrl}"
              th:alt="|${navActivePlaySessionGameTitle} cover|"
              class="nav-active-play-session__cover"
              width="54"
              loading="lazy"
            />
          </span>
          <span
            class="nav-active-play-session__cover-ph"
            th:unless="${navActivePlaySessionCoverUrl != null}"
            aria-hidden="true"
          >
            <i class="fa-solid fa-clock"></i>
          </span>
        </a>
        <div class="nav-active-play-session__body">
          <a
            class="nav-active-play-session__title-link"
            th:href="@{/collection/{id}(id=${navActivePlaySessionGameApiId})}"
            th:title="|Open ${navActivePlaySessionGameTitle}|"
            th:text="${navActivePlaySessionGameTitle}"
            >Game title</a
          >
          <div class="nav-active-play-session__time-row">
            <span class="nav-active-play-session__lcd-wrap">
              <span class="nav-active-play-session__lcd-inner">
                <span
                  class="nav-active-play-session__digits"
                  id="navActivePlaySessionElapsed"
                  aria-live="polite"
                  >00:00:00</span
                >
              </span>
            </span>
            <button
              type="button"
              class="nav-active-play-session__end-btn"
              id="navActivePlaySessionEndBtn"
            >
              End
            </button>
          </div>
        </div>
      </div>
    </aside>
  </body>
</html>
