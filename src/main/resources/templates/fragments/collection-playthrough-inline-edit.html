<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <th:block th:fragment="fields (p, iter, sessionCt)">
      <div
        class="cg-pt-inline-edit"
        data-cg-row
        role="group"
        th:with="ptMode=${(p.current != null and p.current) and (p.progressStatus == null or #strings.equals(p.progressStatus.name(), 'PLAYING')) ? 'ACTIVE' : (p.progressStatus != null and #strings.equals(p.progressStatus.name(), 'COMPLETED') ? 'FINISHED' : 'STOPPED')},
            diffRaw=${p.difficulty != null ? p.difficulty.trim() : ''},
            diffIsPreset=${T(com.cocoding.playstate.model.PlaythroughDifficultyPresets).isPreset(p.difficulty)},
            mmTotal=${p.manualPlayMinutes != null and p.manualPlayMinutes > 0 ? p.manualPlayMinutes : 0},
            diffPresetHidden=${diffRaw == null or diffRaw.isEmpty() ? T(com.cocoding.playstate.model.PlaythroughDifficultyPresets).NORMAL : (diffIsPreset ? T(com.cocoding.playstate.model.PlaythroughDifficultyPresets).displayBucket(diffRaw) : '__CUSTOM__')},
            diffDropdownLabel=${diffRaw == null or diffRaw.isEmpty() ? T(com.cocoding.playstate.model.PlaythroughDifficultyPresets).NORMAL : (diffIsPreset ? T(com.cocoding.playstate.model.PlaythroughDifficultyPresets).displayBucket(diffRaw) : 'Custom')}"
        th:attr="data-playthrough-id=${p.id},data-session-count=${sessionCt}"
      >
        <div
          class="cg-pt-edit-card__body cg-pt-edit-card__body--simple cg-pt-inline-edit__form"
        >
          <div
            class="cgpform-sheet cgpform-sheet--record-mirror cgprs--form cg-pt-inline-edit__sheet"
          >
            <section
              class="cgps cgprs cgprs--pt-body cgprs--pt-body--edit"
              th:attr="aria-label=|Edit playthrough ${iter.count}|"
            >
              <div
                class="cgpd-card__segment cgpd-card__segment--pt-edit-identity cg-pt-inline-edit__group cg-pt-inline-edit__group--identity"
              >
                <div class="cgpd-card__stat-band">
                  <div
                    class="cgpst-tiles cgpst-tiles--playthrough-card"
                  >
                    <div class="cgr-row cgr-row--pt-edit-identity">
                      <div
                        class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field"
                      >
                        <label
                          class="cgr-k"
                          th:for="|cgPtShort_${p.id}|"
                          >Name</label
                        >
                        <input
                          type="text"
                          class="site-field-input cgpt-short-name cg-pt-inline-edit__field-control"
                          data-cg-short-name
                          maxlength="40"
                          autocomplete="off"
                          required
                          aria-required="true"
                          th:id="|cgPtShort_${p.id}|"
                          aria-label="Playthrough name"
                          th:value="${p.shortName != null and !p.shortName.isBlank() ? (#strings.length(p.shortName) > 40 ? #strings.substring(p.shortName, 0, 40) : p.shortName) : ('Playthrough ' + iter.count)}"
                        />
                      </div>
                      <div
                        class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field"
                      >
                        <span
                          class="cgr-k"
                          th:id="|cgPtProgStLbl_${p.id}|"
                          >State</span
                        >
                        <div class="cg-pt-inline-edit__field-control-wrap">
                          <div class="cg-dropdown-field">
                            <input
                              type="hidden"
                              data-cg-progress-status
                              th:id="|cgPtProgSt_${p.id}|"
                              th:value="${ptMode}"
                            />
                            <div class="dropdown cg-form-dropdown">
                              <button
                                type="button"
                                class="dropdown-trigger cgpt-progress-status"
                                th:id="|cgPtProgStTrigger_${p.id}|"
                                aria-haspopup="listbox"
                                aria-expanded="false"
                                th:attr="aria-controls=|cgPtProgStPanel_${p.id}|,
                                    aria-labelledby=|cgPtProgStLbl_${p.id}|"
                                aria-label="Playthrough state"
                              >
                                <span
                                  class="dropdown-label"
                                  th:text="${ptMode == 'ACTIVE' ? 'Active' : (ptMode == 'FINISHED' ? 'Finished' : 'Stopped')}"
                                  >Active</span
                                >
                                <i
                                  class="fa-solid fa-chevron-down dropdown-icon"
                                  aria-hidden="true"
                                ></i>
                              </button>
                              <div
                                class="dropdown-panel"
                                role="listbox"
                                th:id="|cgPtProgStPanel_${p.id}|"
                                aria-hidden="true"
                              >
                                <button
                                  type="button"
                                  class="dropdown-option"
                                  data-value="ACTIVE"
                                  th:classappend="${ptMode == 'ACTIVE'} ? ' is-selected' : ''"
                                >
                                  Active
                                </button>
                                <button
                                  type="button"
                                  class="dropdown-option"
                                  data-value="STOPPED"
                                  th:classappend="${ptMode == 'STOPPED'} ? ' is-selected' : ''"
                                >
                                  Stopped
                                </button>
                                <button
                                  type="button"
                                  class="dropdown-option"
                                  data-value="FINISHED"
                                  th:classappend="${ptMode == 'FINISHED'} ? ' is-selected' : ''"
                                >
                                  Finished
                                </button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="cgpd-card__segment cgpd-card__segment--pt-active-mirror cg-pt-inline-edit__group cg-pt-inline-edit__group--progress"
              >
                <div
                  class="cgpd-card__pt-active-stack"
                  role="region"
                  aria-label="Difficulty, last logged, playtime, progress, and completion"
                >
                  <div class="cgr-row cgr-row--pt-inline-edit-meta-top">
                    <div
                      class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field cg-pt-inline-edit__stat-field--difficulty"
                    >
                      <span class="cgr-k" th:id="|cgPtDiffLbl_${p.id}|">Difficulty</span>
                      <div
                        class="cgpd-card__pt-diff-editor"
                        th:attr="aria-labelledby=|cgPtDiffLbl_${p.id}|"
                      >
                        <div class="cg-dropdown-field">
                          <input
                            type="hidden"
                            data-cg-diff-preset
                            th:id="|cgPtDiff_${p.id}|"
                            th:value="${diffPresetHidden}"
                          />
                          <div class="dropdown cg-form-dropdown">
                            <button
                              type="button"
                              class="dropdown-trigger cgpt-diff-preset"
                              th:id="|cgPtDiffTrigger_${p.id}|"
                              aria-haspopup="listbox"
                              aria-expanded="false"
                              th:attr="aria-controls=|cgPtDiffPanel_${p.id}|"
                              aria-label="Difficulty"
                            >
                              <span
                                class="dropdown-label"
                                th:text="${diffDropdownLabel}"
                                >Normal</span
                              >
                              <i
                                class="fa-solid fa-chevron-down dropdown-icon"
                                aria-hidden="true"
                              ></i>
                            </button>
                            <div
                              class="dropdown-panel"
                              role="listbox"
                              th:id="|cgPtDiffPanel_${p.id}|"
                              aria-hidden="true"
                            >
                              <button
                                type="button"
                                class="dropdown-option"
                                th:each="opt : ${playthroughDifficultyOptions}"
                                th:attr="data-value=${opt}"
                                th:text="${opt}"
                                th:classappend="${((diffRaw == null or diffRaw.isEmpty()) and #strings.equalsIgnoreCase(opt, T(com.cocoding.playstate.model.PlaythroughDifficultyPresets).NORMAL)) or (diffRaw != null and !diffRaw.isEmpty() and diffIsPreset and #strings.equalsIgnoreCase(opt, diffRaw))} ? ' is-selected' : ''"
                              >
                                Normal
                              </button>
                              <button
                                type="button"
                                class="dropdown-option"
                                data-value="__CUSTOM__"
                                th:classappend="${diffRaw != null and !diffRaw.isEmpty() and !diffIsPreset} ? ' is-selected' : ''"
                              >
                                Custom
                              </button>
                            </div>
                          </div>
                        </div>
                        <input
                          type="text"
                          class="site-field-input cgpt-diff-custom cg-pt-inline-edit__field-control"
                          data-cg-diff-custom
                          maxlength="128"
                          autocomplete="off"
                          placeholder="Custom difficulty"
                          th:value="${diffIsPreset ? '' : diffRaw}"
                          th:hidden="${diffIsPreset or diffRaw.isEmpty()}"
                          th:aria-hidden="${diffIsPreset or diffRaw.isEmpty()}"
                        />
                      </div>
                    </div>
                    <div
                      class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field cg-pt-inline-edit__stat-field--readonly"
                    >
                      <span class="cgr-k">Last logged</span>
                      <span class="cgr-v cg-pt-inline-edit__readonly-value cg-pt-inline-edit__readonly-value--plain"
                        th:text="${sessionCt > 0 and playthroughLastPlayedDisplay != null and playthroughLastPlayedDisplay.containsKey(p.id) ? playthroughLastPlayedDisplay.get(p.id) : '—'}">—</span>
                    </div>
                    <div
                      class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field cg-pt-inline-edit__stat-field--playtime"
                    >
                      <span class="cgr-k" th:id="|cgPtPlaytimeLabel_${p.id}|">Playtime</span>
                      <div
                        class="cg-pt-edit-duration-split cg-duration-row cg-pt-inline-edit__field-control-wrap"
                        role="group"
                        th:attr="aria-labelledby=|cgPtPlaytimeLabel_${p.id}|"
                      >
                        <input
                          type="text"
                          class="site-field-input"
                          inputmode="numeric"
                          maxlength="3"
                          data-cg-hours
                          autocomplete="off"
                          th:id="|cgPtH_${p.id}|"
                          th:value="${mmTotal >= 60 ? mmTotal / 60 : ''}"
                        />
                        <span class="cg-pt-edit-duration-suffix">h</span>
                        <input
                          type="text"
                          class="site-field-input"
                          inputmode="numeric"
                          maxlength="2"
                          data-cg-mins
                          autocomplete="off"
                          th:id="|cgPtM_${p.id}|"
                          th:value="${mmTotal > 0 ? mmTotal % 60 : ''}"
                        />
                        <span class="cg-pt-edit-duration-suffix">m</span>
                      </div>
                      <p class="cg-subtle-field-hint cg-pt-inline-edit__playtime-hint">
                        Auto-calculated from play logs. You can manually override it.
                      </p>
                    </div>
                  </div>
                  <div class="cgpd-card__pt-edit-where-pct-row">
                    <div
                      class="cgpd-card__pt-desc-block cgpd-card__pt-desc-block--edit cg-pt-inline-edit__note-field cgpd-card__pt-desc-block--where-pct-pair"
                    >
                      <label
                        class="cgr-k cg-pt-inline-edit__note-label"
                        th:for="|cgPtWhere_${p.id}|"
                        >Where you are</label
                      >
                      <input
                        type="text"
                        class="site-field-input cg-pt-inline-edit__progress-note-input"
                        data-cg-progress-note
                        maxlength="512"
                        autocomplete="off"
                        th:id="|cgPtWhere_${p.id}|"
                        aria-label="Where you are"
                        th:value="${p.progressNote != null ? p.progressNote : ''}"
                        placeholder="Stopped at: boss fight, chapter 3"
                      />
                    </div>
                    <div
                      class="cgpd-card__pt-pct-edit cgpd-card__pt-pct-edit--field"
                    >
                      <label
                        class="cgr-k"
                        th:for="|cgPtPct_${p.id}|"
                        >Completion</label
                      >
                      <div class="cgpd-card__pt-pct-input-wrap">
                        <input
                          type="number"
                          class="site-field-input cgpd-card__pt-pct-input cgpd-card__pt-pct-input--boxed"
                          data-cg-completion-percent
                          min="0"
                          max="100"
                          step="1"
                          inputmode="numeric"
                          autocomplete="off"
                          th:id="|cgPtPct_${p.id}|"
                          th:value="${p.completionPercent != null ? p.completionPercent : ''}"
                          placeholder="—"
                          aria-label="Completion percent"
                        />
                        <span class="cgpd-card__pt-pct-suffix" aria-hidden="true"
                          >%</span
                        >
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="cgpd-card__segment cgpd-card__segment--playthrough-meta cg-pt-inline-edit__group cg-pt-inline-edit__group--meta"
              >
                <div class="cgpd-card__stat-band">
                  <div
                    class="cgpst-tiles cgpst-tiles--playthrough-card"
                    role="group"
                    aria-label="Started and finished dates"
                  >
                    <div
                      class="cgr-row cgr-row--status-playtime-sessions cgr-row--pt-inline-edit-dates"
                    >
                      <div
                        class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field cg-pt-inline-edit__stat-field--readonly"
                      >
                        <span class="cgr-k">Started</span>
                        <span class="cgr-v cg-pt-inline-edit__readonly-value"
                          th:text="${p.createdDateDisplay != null ? p.createdDateDisplay : '—'}">—</span>
                      </div>
                      <div
                        class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field"
                      >
                        <label class="cgr-k" th:for="|cgPtEnd_${p.id}|">Finished</label>
                        <input
                          type="date"
                          class="site-field-input cg-input-date cg-pt-inline-edit__field-control"
                          th:id="|cgPtEnd_${p.id}|"
                          data-cg-end-date
                          autocomplete="off"
                          th:value="${p.endedDateInputValue}"
                        />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </th:block>

    <th:block th:fragment="draftFields (suffix)">
      <div
        class="cg-pt-inline-edit"
        data-cg-row
        data-cg-draft="true"
        role="group"
        th:with="ptMode='STOPPED',
            diffRaw='',
            diffIsPreset=false,
            mmTotal=0,
            diffPresetHidden=${T(com.cocoding.playstate.model.PlaythroughDifficultyPresets).NORMAL},
            diffDropdownLabel=${T(com.cocoding.playstate.model.PlaythroughDifficultyPresets).NORMAL}"
        th:attr="data-session-count=0"
      >
        <div
          class="cg-pt-edit-card__body cg-pt-edit-card__body--simple cg-pt-inline-edit__form"
        >
          <div
            class="cgpform-sheet cgpform-sheet--record-mirror cgprs--form cg-pt-inline-edit__sheet"
          >
            <section
              class="cgps cgprs cgprs--pt-body cgprs--pt-body--edit"
              aria-label="New playthrough"
            >
              <div
                class="cgpd-card__segment cgpd-card__segment--pt-edit-identity cg-pt-inline-edit__group cg-pt-inline-edit__group--identity"
              >
                <div class="cgpd-card__stat-band">
                  <div class="cgpst-tiles cgpst-tiles--playthrough-card">
                    <div class="cgr-row cgr-row--pt-edit-identity">
                      <div
                        class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field"
                      >
                        <label
                          class="cgr-k"
                          th:for="|cgPtShort_${suffix}|"
                          >Name</label
                        >
                        <input
                          type="text"
                          class="site-field-input cgpt-short-name cg-pt-inline-edit__field-control"
                          data-cg-short-name
                          maxlength="40"
                          autocomplete="off"
                          required
                          aria-required="true"
                          th:id="|cgPtShort_${suffix}|"
                          aria-label="Playthrough name"
                          value="Playthrough __ORD__"
                        />
                      </div>
                      <div
                        class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field"
                      >
                        <span
                          class="cgr-k"
                          th:id="|cgPtProgStLbl_${suffix}|"
                          >State</span
                        >
                        <div class="cg-pt-inline-edit__field-control-wrap">
                          <div class="cg-dropdown-field">
                            <input
                              type="hidden"
                              data-cg-progress-status
                              th:id="|cgPtProgSt_${suffix}|"
                              value="STOPPED"
                            />
                            <div class="dropdown cg-form-dropdown">
                              <button
                                type="button"
                                class="dropdown-trigger cgpt-progress-status"
                                th:id="|cgPtProgStTrigger_${suffix}|"
                                aria-haspopup="listbox"
                                aria-expanded="false"
                                th:attr="aria-controls=|cgPtProgStPanel_${suffix}|,
                                    aria-labelledby=|cgPtProgStLbl_${suffix}|"
                                aria-label="Playthrough state"
                              >
                                <span class="dropdown-label">Stopped</span>
                                <i
                                  class="fa-solid fa-chevron-down dropdown-icon"
                                  aria-hidden="true"
                                ></i>
                              </button>
                              <div
                                class="dropdown-panel"
                                role="listbox"
                                th:id="|cgPtProgStPanel_${suffix}|"
                                aria-hidden="true"
                              >
                                <button
                                  type="button"
                                  class="dropdown-option"
                                  data-value="ACTIVE"
                                >
                                  Active
                                </button>
                                <button
                                  type="button"
                                  class="dropdown-option is-selected"
                                  data-value="STOPPED"
                                >
                                  Stopped
                                </button>
                                <button
                                  type="button"
                                  class="dropdown-option"
                                  data-value="FINISHED"
                                >
                                  Finished
                                </button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="cgpd-card__segment cgpd-card__segment--pt-active-mirror cg-pt-inline-edit__group cg-pt-inline-edit__group--progress"
              >
                <div
                  class="cgpd-card__pt-active-stack"
                  role="region"
                  aria-label="Difficulty, last logged, playtime, progress, and completion"
                >
                  <div class="cgr-row cgr-row--pt-inline-edit-meta-top">
                    <div
                      class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field cg-pt-inline-edit__stat-field--difficulty"
                    >
                      <span class="cgr-k" th:id="|cgPtDiffLbl_${suffix}|">Difficulty</span>
                      <div
                        class="cgpd-card__pt-diff-editor"
                        th:attr="aria-labelledby=|cgPtDiffLbl_${suffix}|"
                      >
                        <div class="cg-dropdown-field">
                          <input
                            type="hidden"
                            data-cg-diff-preset
                            th:id="|cgPtDiff_${suffix}|"
                            th:value="${diffPresetHidden}"
                          />
                          <div class="dropdown cg-form-dropdown">
                            <button
                              type="button"
                              class="dropdown-trigger cgpt-diff-preset"
                              th:id="|cgPtDiffTrigger_${suffix}|"
                              aria-haspopup="listbox"
                              aria-expanded="false"
                              th:attr="aria-controls=|cgPtDiffPanel_${suffix}|"
                              aria-label="Difficulty"
                            >
                              <span
                                class="dropdown-label"
                                th:text="${diffDropdownLabel}"
                                >Normal</span
                              >
                              <i
                                class="fa-solid fa-chevron-down dropdown-icon"
                                aria-hidden="true"
                              ></i>
                            </button>
                            <div
                              class="dropdown-panel"
                              role="listbox"
                              th:id="|cgPtDiffPanel_${suffix}|"
                              aria-hidden="true"
                            >
                              <button
                                type="button"
                                class="dropdown-option"
                                th:each="opt : ${playthroughDifficultyOptions}"
                                th:attr="data-value=${opt}"
                                th:text="${opt}"
                                th:classappend="${#strings.equalsIgnoreCase(opt, T(com.cocoding.playstate.model.PlaythroughDifficultyPresets).NORMAL)} ? ' is-selected' : ''"
                              >
                                Normal
                              </button>
                              <button
                                type="button"
                                class="dropdown-option"
                                data-value="__CUSTOM__"
                              >
                                Custom
                              </button>
                            </div>
                          </div>
                        </div>
                        <input
                          type="text"
                          class="site-field-input cgpt-diff-custom cg-pt-inline-edit__field-control"
                          data-cg-diff-custom
                          maxlength="128"
                          autocomplete="off"
                          placeholder="Custom difficulty"
                          value=""
                          hidden
                          aria-hidden="true"
                        />
                      </div>
                    </div>
                    <div
                      class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field cg-pt-inline-edit__stat-field--readonly"
                    >
                      <span class="cgr-k">Last logged</span>
                      <span class="cgr-v cg-pt-inline-edit__readonly-value cg-pt-inline-edit__readonly-value--plain">—</span>
                    </div>
                    <div
                      class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field cg-pt-inline-edit__stat-field--playtime"
                    >
                      <span class="cgr-k" th:id="|cgPtPlaytimeLabel_${suffix}|">Playtime</span>
                      <div
                        class="cg-pt-edit-duration-split cg-duration-row cg-pt-inline-edit__field-control-wrap"
                        role="group"
                        th:attr="aria-labelledby=|cgPtPlaytimeLabel_${suffix}|"
                      >
                        <input
                          type="text"
                          class="site-field-input"
                          inputmode="numeric"
                          maxlength="3"
                          data-cg-hours
                          autocomplete="off"
                          th:id="|cgPtH_${suffix}|"
                          value=""
                        />
                        <span class="cg-pt-edit-duration-suffix">h</span>
                        <input
                          type="text"
                          class="site-field-input"
                          inputmode="numeric"
                          maxlength="2"
                          data-cg-mins
                          autocomplete="off"
                          th:id="|cgPtM_${suffix}|"
                          value=""
                        />
                        <span class="cg-pt-edit-duration-suffix">m</span>
                      </div>
                      <p class="cg-subtle-field-hint cg-pt-inline-edit__playtime-hint">
                        Auto-calculated from play logs. You can manually override it.
                      </p>
                    </div>
                  </div>
                  <div class="cgpd-card__pt-edit-where-pct-row">
                    <div
                      class="cgpd-card__pt-desc-block cgpd-card__pt-desc-block--edit cg-pt-inline-edit__note-field cgpd-card__pt-desc-block--where-pct-pair"
                    >
                      <label
                        class="cgr-k cg-pt-inline-edit__note-label"
                        th:for="|cgPtWhere_${suffix}|"
                        >Where you are</label
                      >
                      <input
                        type="text"
                        class="site-field-input cg-pt-inline-edit__progress-note-input"
                        data-cg-progress-note
                        maxlength="512"
                        autocomplete="off"
                        th:id="|cgPtWhere_${suffix}|"
                        aria-label="Where you are"
                        value=""
                        placeholder="Stopped at: boss fight, chapter 3"
                      />
                    </div>
                    <div
                      class="cgpd-card__pt-pct-edit cgpd-card__pt-pct-edit--field"
                    >
                      <label
                        class="cgr-k"
                        th:for="|cgPtPct_${suffix}|"
                        >Completion</label
                      >
                      <div class="cgpd-card__pt-pct-input-wrap">
                        <input
                          type="number"
                          class="site-field-input cgpd-card__pt-pct-input cgpd-card__pt-pct-input--boxed"
                          data-cg-completion-percent
                          min="0"
                          max="100"
                          step="1"
                          inputmode="numeric"
                          autocomplete="off"
                          th:id="|cgPtPct_${suffix}|"
                          value=""
                          placeholder="—"
                          aria-label="Completion percent"
                        />
                        <span class="cgpd-card__pt-pct-suffix" aria-hidden="true"
                          >%</span
                        >
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="cgpd-card__segment cgpd-card__segment--playthrough-meta cg-pt-inline-edit__group cg-pt-inline-edit__group--meta"
              >
                <div class="cgpd-card__stat-band">
                  <div
                    class="cgpst-tiles cgpst-tiles--playthrough-card"
                    role="group"
                    aria-label="Started and finished dates"
                  >
                    <div
                      class="cgr-row cgr-row--status-playtime-sessions cgr-row--pt-inline-edit-dates"
                    >
                      <div
                        class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field cg-pt-inline-edit__stat-field--readonly"
                      >
                        <span class="cgr-k">Started</span>
                        <span class="cgr-v cg-pt-inline-edit__readonly-value"
                          th:text="${#temporals.format(T(java.time.LocalDate).now(), 'MMM d, yyyy')}">Apr 15, 2026</span>
                      </div>
                      <div
                        class="cgr-stat cgp-record-stat cg-pt-inline-edit__stat-field"
                      >
                        <label class="cgr-k" th:for="|cgPtEnd_${suffix}|">Finished</label>
                        <input
                          type="date"
                          class="site-field-input cg-input-date cg-pt-inline-edit__field-control"
                          th:id="|cgPtEnd_${suffix}|"
                          data-cg-end-date
                          autocomplete="off"
                          value=""
                        />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </th:block>
  </body>
</html>
